name: Post-deploy smoke

# Vercel's Git integration creates GitHub Deployments and emits a
# `deployment_status` event when a deploy finishes. We run the Playwright smoke
# against the deployed URL once a Production deploy reports success. A failure
# turns this check red on the deployment so a bad release is caught immediately.
on:
  deployment_status

jobs:
  smoke:
    # Only production deploys, and only after they succeed.
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: "true"
          SMOKE_BASE_URL: ${{ github.event.deployment_status.target_url }}
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      # Runs the same suite as `npm test`, and additionally fails if coverage
      # drops below the thresholds in vite.config.ts.
      - run: npm run coverage

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"
      - run: npm ci
      - run: npm run build
